name: Deploy Glue with Terraform

on:
  workflow_dispatch:

env:
  TF_ROOT: infra
  AWS_REGION: us-west-2

jobs:
  terraform-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: |
          cd $TF_ROOT
          terraform fmt

  terraform-validate:
    runs-on: ubuntu-latest
    needs: terraform-format

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init

      - name: Terraform Validate
        run: |
          cd $TF_ROOT
          terraform validate

  test:
    runs-on: ubuntu-latest
    needs: terraform-validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Glue Script
        run: |
          python -m py_compile src/glue/*.py

  deploy-glue:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Glue Script
        run: |
          chmod +x scripts/upload_glue.sh
          ./scripts/upload_glue.sh

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init

      - name: Terraform Plan
        run: |
          cd $TF_ROOT
          terraform plan

      - name: Deploy Glue Job
        run: |
          cd $TF_ROOT
          terraform apply -auto-approve -target=aws_glue_job.glue_job