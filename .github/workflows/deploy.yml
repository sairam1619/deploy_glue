name: Deploy Glue with Terraform

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  TF_ROOT: infra
  AWS_REGION: us-west-2

jobs:
  terraform-format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: |
          cd $TF_ROOT
          terraform fmt -check

  terraform-validate:
    runs-on: ubuntu-latest
    needs: terraform-format

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd $TF_ROOT
          terraform validate

  test:
    runs-on: ubuntu-latest
    needs: terraform-validate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Glue Script
        run: |
          python -m py_compile src/glue/glue_job.py

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload Glue Script to S3
        run: |
          chmod +x scripts/upload_glue.sh
          ./scripts/upload_glue.sh

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init

      - name: Terraform Plan
        run: |
          cd $TF_ROOT
          terraform plan

      - name: Terraform Apply
        run: |
          cd $TF_ROOT
          terraform apply -auto-approve -input=false

  destroy:
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init

      - name: Terraform Destroy
        run: |
          cd $TF_ROOT
          terraform destroy -auto-approve -input=false
